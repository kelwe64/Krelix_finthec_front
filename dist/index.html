<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krelix</title>
    <link rel="icon" type="image/png" href="imagens/logo_kreli.png">
    <link rel="stylesheet" href="/dist/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100 h-screen flex flex-col lg:flex-row">

    <!-- barra-lateral -->
    <aside class="fixed bottom-0 left-0 w-full lg:static lg:w-70 bg-gulf-blue-950 flex flex-row lg:flex-col justify-between lg:justify-between py-2 lg:py-6 p-2 lg:p-4 z-50">

        <!-- logo -->
        <div class="hidden lg:flex text-white text-[48px] font-bold mb-10 items-center gap-2">
            <img src="imagens/Logo_Kreli.png" alt=""><span>Krelix</span>
        </div>

        <!-- menu de navegação -->
        <nav class="flex flex-row lg:flex-col justify-between lg:justify-start w-full gap-1 lg:gap-2 overflow-x-auto">
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-house"></i>
                <span class="hidden lg:inline">Dashboard</span>
            </a>
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-calendar"></i>
                <span class="hidden lg:inline">Contas</span>
            </a>
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <span class="hidden lg:inline">Transferências</span>
            </a>
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-credit-card"></i>
                <span class="hidden lg:inline">Pagamentos</span>
            </a>

            <a href="#"
                class="bg-gulf-blue-700 text-white text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-user-group"></i>
                <span class="hidden lg:inline">Clientes</span>
            </a>

            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-chart-line"></i>
                <span class="hidden lg:inline">Investimentos</span>
            </a>
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-book-open"></i>
                <span class="hidden lg:inline">Relatórios</span>
            </a>
            <a href="#"
                class="text-white hover:bg-gulf-blue-600 text-[20px] font-bold rounded-lg px-3 py-1.5 lg:py-2 flex items-center gap-2">
                <i class="fa-solid fa-gear"></i>
                <span class="hidden lg:inline">Configurações</span>
            </a>
        </nav>

        <!-- perfil do usuario -->
        <div class="hidden lg:flex items-center gap-3 text-white">

            <!-- Avatar -->
            <div class="w-13 h-13 rounded-full bg-gulf-blue-500 flex items-center justify-center font-bold text-[20px]">
                KF
            </div>
            <div>
                <p class="font-semibold text-sm">Kelwe Ferreira</p>
                <p class="text-blue-300 text-xs">administrador</p>
            </div>
        </div>
    </aside>
    
    <main class="flex-1 p-4 lg:p-8 pb-20 lg:pb-8 overflow-auto">

        <!-- CABEÇALHO -->
        <div class="mb-20">
            <!-- mb-6 = margem embaixo, separa o título do formulário -->
            <h1 class="text-2xl font-bold text-gray-800">Novo Cliente</h1>
            <p class="text-gray-400 text-sm mt-1">preencha os dados para adicionar um novo cliente.</p>
        </div>

        <!-- FORMULÁRIO -->
        <div class="bg-white rounded-2xl shadow-sm p-10 max-w-full">

            <!-- DADOS PESSOAIS  -->
            <div class="mb-14">
                <h2 class="text-base font-bold text-gray-700 mb-6">Dados Pessoais</h2>

                <!-- Nome Completo + CPF -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                    <div class="flex flex-col gap-4">
                        <label class="text-sm font-medium text-gray-600">Nome Completo</label>
                        <input type="text" placeholder="Digite o nome completo"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div class="flex flex-col gap-4">
                        <label class="text-sm font-medium text-gray-600">CPF</label>
                        <input type="text" placeholder="000.000.000-00"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>

                <!-- E-mail + Telefone -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-600">E-mail</label>
                        <input type="email" placeholder="email@exemplo.com"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-600">Telefone</label>
                        <input type="text" placeholder="(00) 00000-0000"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>

                <!-- Data de Nascimento -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-600">Data de nascimento</label>
                        <input type="date"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
            </div>

            <hr class="border-gray-200 mb-8" />

            <!-- ======= DADOS DE ACESSO ======= -->
            <div class="mb-8">
                <h2 class="text-base font-semibold text-gray-700 mb-4">Dados de Acesso</h2>

                <!-- Senha + Confirmar Senha -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-600">Senha</label>
                        <input type="password" placeholder="Digite uma senha"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-600">Confirme a senha</label>
                        <input type="password" placeholder="Confirme a senha"
                            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
            </div>

            <!-- Botões -->
            <div class="flex justify-end gap-3">

                <button class="px-6 py-2 rounded-lg border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">
                    Cancelar
                </button>

                <button class="px-6 py-2 rounded-lg bg-blue-700 text-white text-sm font-semibold hover:bg-blue-800">
                    Cadastrar
                </button>
            </div>

        </div>
    </main>
</body>

</html>
